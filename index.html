<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Öğretmen Takip</title>
<link rel="manifest" href="manifest.json">
<style>
  :root { --primary: #2563eb; --gray: #6b7280; --border: #e5e7eb; --text: #111827; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f0f4ff; color: var(--text); padding-bottom: 80px; }
  header { background: var(--primary); color: white; padding: 15px; text-align: center; }
  nav { display: flex; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
  nav button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: var(--gray); border-bottom: 3px solid transparent; }
  nav button.active { color: var(--primary); border-bottom-color: var(--primary); background: #f0f7ff; }
  .page { display: none; padding: 15px; }
  .page.active { display: block; }
  .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
  #debugLog { position: fixed; bottom: 0; left: 0; width: 100%; background: #333; color: #0f0; font-size: 10px; padding: 5px; max-height: 60px; overflow-y: auto; z-index: 9999; }
</style>
</head>
<body>

<header>
  <h2 id="headerTitle">📚 Öğretmen Takip</h2>
  <small id="dateInfo"></small>
</header>

<nav>
  <button id="btn-yoklama" class="active" onclick="git('yoklama', this)">📋 Yoklama</button>
  <button id="btn-ayarlar" onclick="git('ayarlar', this)">⚙️ Ayarlar</button>
</nav>

<div id="yoklama" class="page active">
  <div class="card">
    <h3>📋 Öğrenci Listesi (30 Kişi)</h3>
    <div id="mainList" style="margin-top:10px;">Yükleniyor...</div>
  </div>
</div>

<div id="ayarlar" class="page">
  <div class="card">
    <h3>⚙️ Uygulama Yönetimi</h3>
    <p style="font-size:12px; margin-bottom:10px;">Eğer menüler çalışmıyorsa aşağıdaki butona basıp sayfayı yenileyin.</p>
    <button class="btn" onclick="temizle()" style="background:red;">⚠️ HAFIZAYI SIFIRLA</button>
  </div>
</div>

<div id="debugLog">Sistem başlatılıyor...</div>

<script>
// Hata Takipçisi (Debug)
function log(msg) {
    const d = document.getElementById('debugLog');
    d.innerHTML += "<br>> " + msg;
    console.log(msg);
}

// 30 kişilik listeniz
const OGRENCILER = [{no:309,ad:"Arda"},{no:318,ad:"Bilgesu"},{no:470,ad:"Irmak"},{no:484,ad:"Yaz"},{no:485,ad:"Beyazıt"},{no:512,ad:"Kumsal"},{no:526,ad:"Nisa"},{no:554,ad:"Esra"},{no:556,ad:"Naz"},{no:614,ad:"Ayşe"},{no:616,ad:"Mustafa"},{no:619,ad:"Barış"},{no:631,ad:"Hüma"},{no:639,ad:"Poyraz"},{no:650,ad:"Yusuf"},{no:657,ad:"Onuralp"},{no:668,ad:"Ali Ömer"},{no:696,ad:"Roza"},{no:712,ad:"Mert"},{no:760,ad:"İpek"},{no:761,ad:"Eymen"},{no:784,ad:"Önder"},{no:788,ad:"Bora"},{no:789,ad:"Elif"},{no:839,ad:"Defne"},{no:849,ad:"Rüzgar"},{no:873,ad:"Derin"},{no:883,ad:"Melis"},{no:894,ad:"Emir Efe"},{no:901,ad:"Musa"}];

// Global Fonksiyon: Sayfa Değiştirme
window.git = function(id, btn) {
    log("Sayfaya geçiliyor: " + id);
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    
    const p = document.getElementById(id);
    if(p) {
        p.classList.add('active');
        btn.classList.add('active');
        log("Başarılı.");
    } else {
        log("Hata: Sayfa bulunamadı!");
    }
}

// Global Fonksiyon: Sıfırlama
window.temizle = function() {
    log("Sıfırlanıyor...");
    localStorage.clear();
    if('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
            regs.forEach(r => r.unregister());
            log("Service Worker silindi.");
        });
    }
    alert("Hafıza temizlendi. Sayfa yenileniyor...");
    location.reload(true);
}

// Başlatıcı
document.addEventListener('DOMContentLoaded', () => {
    try {
        log("Liste oluşturuluyor...");
        const list = document.getElementById('mainList');
        list.innerHTML = OGRENCILER.map(s => `<div style="padding:12px; border-bottom:1px solid #eee; font-weight:bold;">${s.no} - ${s.ad}</div>`).join('');
        
        document.getElementById('dateInfo').innerText = new Date().toLocaleDateString('tr-TR');
        log("Uygulama hazır.");
    } catch(err) {
        log("KRİTİK HATA: " + err.message);
    }
});
</script>
</body>
</html>
