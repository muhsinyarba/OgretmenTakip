<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Öğretmen Takip">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Öğretmen Takip</title>
<style>
  :root {
    --primary: #2563eb; --primary-light: #dbeafe; --success: #16a34a; --success-light: #dcfce7;
    --danger: #dc2626; --danger-light: #fee2e2; --warn: #d97706; --warn-light: #fef3c7;
    --gray: #6b7280; --gray-light: #f3f4f6; --border: #e5e7eb; --white: #ffffff; --text: #111827;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4ff; color: var(--text); font-size: 14px; padding-bottom: env(safe-area-inset-bottom); }

  header { background: var(--primary); color: white; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  header h1 { font-size: 16px; font-weight: 700; }
  header span { font-size: 12px; opacity: 0.85; }

  nav { display: flex; background: white; border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 53px; z-index: 99; }
  nav button { flex: 1; min-width: 80px; padding: 12px 6px; border: none; background: none; font-size: 12px; font-weight: 600; color: var(--gray); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  nav button.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--primary-light); }

  .page { display: none; padding: 12px; }
  .page.active { display: block; }

  .card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: var(--primary); }

  select, input[type=text], input[type=date] { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: white; color: var(--text); margin-bottom: 10px; }
  
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; width: auto; }
  .btn-outline { background: none; border: 1.5px solid var(--primary); color: var(--primary); }

  .student-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .sname { font-weight: 600; font-size: 13px; flex: 1; }
  .sno { font-size: 11px; color: var(--gray); }

  .att-btns { display: flex; gap: 4px; }
  .att-btn { padding: 6px 10px; border-radius: 6px; border: 1.5px solid var(--border); background: white; font-size: 12px; font-weight: 700; cursor: pointer; }
  .att-btn.var { background: var(--success); color: white; border-color: var(--success); }
  .att-btn.yok { background: var(--danger); color: white; border-color: var(--danger); }
  .att-btn.gec { background: var(--warn); color: white; border-color: var(--warn); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-success { background: var(--success-light); color: var(--success); }
  .badge-warn { background: var(--warn-light); color: var(--warn); }

  .hw-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .hw-title { font-weight: 600; margin-bottom: 6px; }
  .hw-students { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .hw-tag { padding: 3px 8px; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: var(--gray-light); }
  .hw-tag.teslim { background: var(--success-light); color: var(--success); border-color: var(--success); }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-box { background: white; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 800; color: var(--primary); }

  .report-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .report-name { flex: 1; font-size: 13px; font-weight: 600; }
  .progress-bar { height: 6px; border-radius: 3px; background: var(--gray-light); overflow: hidden; width: 80px; }
  .progress-fill { height: 100%; background: var(--primary); }

  .saved-msg { background: var(--success-light); color: var(--success); padding: 8px 12px; border-radius: 8px; text-align: center; font-weight: 600; display: none; margin-bottom: 10px; }
</style>
</head>
<body>

<header>
  <div><h1>📚 Öğretmen Takip</h1><span id="todayLabel"></span></div>
  <div id="classLabel" style="font-size:12px;text-align:right;opacity:0.9;"></div>
</header>

<nav>
  <button class="active" onclick="showPage('yoklama',this)">📋 Yoklama</button>
  <button onclick="showPage('odev',this)">📝 Ödev</button>
  <button onclick="showPage('rapor',this)">📊 Rapor</button>
  <button onclick="showPage('ayarlar',this)">⚙️ Ayarlar</button>
</nav>

<div id="yoklama" class="page active">
  <div class="card">
    <h2>📋 Yoklama Al</h2>
    <select id="yoklamaDers"></select>
    <input type="date" id="yoklamaTarih">
    <div id="savedMsg" class="saved-msg">✅ Kaydedildi!</div>
    <div id="studentList"></div>
    <button class="btn btn-primary" onclick="saveAttendance()" id="saveAttBtn" style="display:none;margin-top:10px;">💾 Kaydet</button>
  </div>
</div>

<div id="odev" class="page">
  <div class="card">
    <h2>➕ Yeni Ödev</h2>
    <select id="odevDers"></select>
    <input type="text" id="odevBaslik" placeholder="Ödev başlığı">
