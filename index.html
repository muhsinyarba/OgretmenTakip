<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Öğretmen Takip PRO - V25</title>
<style>
  :root { --p: #2563eb; --s: #16a34a; --d: #ef4444; --w: #f59e0b; }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; touch-action: manipulation; }
  body { background: #f0f4ff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }
  header { background: var(--p); color: white; padding: 10px; text-align: center; font-size: 14px; font-weight: bold; flex-shrink: 0; }
  .top-panel { background: #1e293b; color: white; padding: 8px; flex-shrink: 0; }
  .main-container { display: flex; flex: 1; overflow: hidden; }
  nav { width: 70px; background: #1e3a8a; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; }
  nav button { padding: 18px 2px; border: none; background: none; color: white; font-size: 10px; cursor: pointer; border-bottom: 1px solid #2563eb; opacity: 0.8; -webkit-tap-highlight-color: transparent; }
  nav button.active { background: var(--p); opacity: 1; border-left: 4px solid white; font-weight: bold; }
  .content { flex: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; background: #fff; }
  .page { display: none; }
  .page.active { display: block !important; }
  .card { background: white; border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; }
  .btn-m { width: 100%; padding: 12px; border-radius: 6px; border: none; background: var(--p); color: white; font-weight: bold; margin-bottom: 5px; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
</style>
</head>
<body>

<header>Öğretmen Takip PRO - V25</header>

<div class="top-panel">
  <div style="display:flex; justify-content:space-between; align-items:center; font-size:11px;">
    <span>Sınıf: <b id="curDisplay">...</b></span>
    <button onclick="sv()" style="background:var(--s); color:white; border:none; padding:5px 10px; border-radius:4px;">KAYDET</button>
  </div>
</div>

<div class="main-container">
  <nav id="sidebar">
    <button id="btn_p1" onclick="pg('p1')" class="active">YOKLAMA</button>
    <button id="btn_p2" onclick="pg('p2')">KATILIM</button>
    <button id="btn_p3" onclick="pg('p3')">ÖDEV</button>
    <button id="btn_p6" onclick="pg('p6')">SÖZLÜ</button>
    <button id="btn_p4" onclick="pg('p4')">RAPOR</button>
    <button id="btn_p5" onclick="pg('p5')">AYAR</button>
  </nav>

  <div class="content">
    <div id="p1" class="page active"><div class="card"><h3>Yoklama</h3><input type="date" id="t1" onchange="r()"><div id="l1"></div></div></div>
    <div id="p2" class="page"><div class="card"><h3>Katılım</h3><select id="s2" onchange="r()"></select><div id="l2"></div></div></div>
    <div id="p3" class="page"><div class="card"><h3>Ödev</h3><select id="s3" onchange="r()"></select><input type="text" id="oN" placeholder="Ödev Konusu" oninput="nS()"><div id="l3"></div></div></div>
    <div id="p6" class="page"><div class="card"><h3>Sözlü</h3><select id="s6" onchange="r()"></select><input type="text" id="sN" placeholder="Sözlü Konusu" oninput="nS()"><div id="l6"></div></div></div>
    <div id="p4" class="page">
      <div class="card">
        <h3>Genel Rapor</h3>
        <button class="btn-m" style="background:var(--s)" onclick="exportExcel()">EXCEL İNDİR</button>
        <button class="btn-m" style="background:var(--d)" onclick="window.print()">PDF/YAZDIR</button>
        <div id="l4" style="margin-top:10px"></div>
      </div>
    </div>
    <div id="p5" class="page">
      <div class="card"><h3>Ayarlar</h3><button class="btn-m" style="background:var(--d)" onclick="sifirla()">⚠️ SİSTEMİ SIFIRLA</button></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// 4-B Sınıfı ve Derslerin Tanımlanması
const defO = ["Ali Ömer ARSLAN","Arda ARSLAN","Ayşe ŞINIK","Barış HALLUM","Beyazıt GÖRKEN","Bilgesu TOPRAK","Bora ALAS","Defne KAYNAR","Derin URAZ","Elif ÇİTKAP","Emir Efe ALPER","Esra DEMİRLİ","Eymen HALICI","Hüma ALTINIŞIK","İpek ELDEK","Irmak ERDEM","Kumsal GÜNDOĞARKEN","Melis KILIÇ","Mert BALCIOĞLU","Musa KARAÖZ","Mustafa DAL","Naz AKGÜN","Nisa YALILAR","Onuralp TOK","Önder TURĞAY","Poyraz SEZGİN","Roza AYDIN","Rüzgar GÜL","Yaz YILMAZ","Yusuf BİRLİK"];
const defD = ["Türkçe","Matematik","Fen","Sosyal","İngilizce","Trafik","İnsan Hakları"];

// V25 etiketi ile temiz başlangıç
let st = JSON.parse(localStorage.getItem('ok_v25')) || {
    cls: {"4-B": defO}, cur: "4-B", ders: defD,
    db: {v:{}, k:{}, od:{}, notes:{}, sz:{}, szNotes:{}}
};

function pg(id) {
    // Tüm sayfaları gizle
    const pgs = document.querySelectorAll('.page');
    pgs.forEach(p => { p.style.display = 'none'; p.classList.remove('active'); });
    
    // Tüm butonları pasif yap
    const btns = document.querySelectorAll('#sidebar button');
    btns.forEach(b => b.classList.remove('active'));
    
    // Hedef sayfayı göster
    const target = document.getElementById(id);
    target.style.display = 'block';
    target.classList.add('active');
    document.getElementById('btn_' + id).classList.add('active');
    
    if(id === 'p4') rRap();
}

function sv() { localStorage.setItem('ok_v25', JSON.stringify(st)); alert("Veriler Kaydedildi!"); }
function sifirla() { if(confirm('Tüm veriler silinecek?')){ localStorage.clear(); location.reload(); } }

function r() {
    const oL = st.cls[st.cur] || [];
    const tV = document.getElementById('t1').value;
    const l1 = document.getElementById('l1');
    if(!l1) return;
    
    l1.innerHTML = oL.map(s => `
        <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;">
            <span style="font-size:11px">${s}</span>
            <button onclick="u('v','${tV}','${s}','y')" style="font-size:10px; background:${st.db.v[tV+"_"+st.cur]?.[s]==='y'?'#ef4444':'#ddd'}">YOK</button>
        </div>
    `).join('');
}

function rRap() {
    let h = "<table><tr><th>Ad</th><th>Y</th><th>⭐</th><th>✅</th><th>+</th></tr>";
    st.cls[st.cur].forEach(s => {
        h += `<tr><td>${s}</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>`;
    });
    document.getElementById('l4').innerHTML = h + "</table>";
}

function exportExcel() {
    const ws = XLSX.utils.table_to_sheet(document.querySelector("#l4 table"));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Rapor");
    XLSX.writeFile(wb, "4B_Rapor.xlsx");
}

window.onload = function() {
    document.getElementById('t1').value = new Date().toISOString().split('T')[0];
    document.getElementById('curDisplay').innerText = st.cur;
    
    // Dersleri doldur
    const opt = '<option value="">Ders Seçiniz</option>' + st.ders.map(d => `<option value="${d}">${d}</option>`).join('');
    ['s2','s3','s6'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerHTML = opt; });
    
    r();
    console.log("Sistem Hazır - V25");
};
</script>
</body>
</html>
