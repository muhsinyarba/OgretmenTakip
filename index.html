<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Öğretmen Takip</title>
<link rel="manifest" href="manifest.json">
<style>
  :root { --primary: #2563eb; --gray: #6b7280; }
  body { font-family: sans-serif; margin: 0; background: #f0f4ff; }
  header { background: var(--primary); color: white; padding: 15px; text-align: center; }
  nav { display: flex; background: white; border-bottom: 1px solid #ddd; }
  nav button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; }
  nav button.active { border-bottom: 3px solid var(--primary); color: var(--primary); }
  .page { display: none; padding: 20px; }
  .page.active { display: block; }
  .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<header>
  <h2 id="classTitle">Öğretmen Takip</h2>
</header>

<nav>
  <button class="active" onclick="show('yoklama', this)">📋 Yoklama</button>
  <button onclick="show('ayarlar', this)">⚙️ Ayarlar</button>
</nav>

<div id="yoklama" class="page active">
  <div class="card">
    <h3>📋 Bugünün Listesi</h3>
    <div id="listContainer">Yükleniyor...</div>
  </div>
</div>

<div id="ayarlar" class="page">
  <div class="card">
    <h3>⚙️ Ayarlar</h3>
    <input type="text" id="cName" placeholder="Sınıf Adı" style="width:100%; padding:10px; margin-bottom:10px;">
    <button onclick="saveC()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:5px;">Kaydet</button>
    <hr style="margin:20px 0;">
    <button onclick="hardReset()" style="width:100%; padding:10px; background:red; color:white; border:none; border-radius:5px;">⚠️ Uygulamayı Sıfırla (Hata Çözücü)</button>
  </div>
</div>

<script>
// 30 kişilik listeniz
const STUDENTS = [{no:309,ad:"Arda"},{no:318,ad:"Bilgesu"},{no:470,ad:"Irmak"},{no:484,ad:"Yaz"},{no:485,ad:"Beyazıt"},{no:512,ad:"Kumsal"},{no:526,ad:"Nisa"},{no:554,ad:"Esra"},{no:556,ad:"Naz"},{no:614,ad:"Ayşe"},{no:616,ad:"Mustafa"},{no:619,ad:"Barış"},{no:631,ad:"Hüma"},{no:639,ad:"Poyraz"},{no:650,ad:"Yusuf"},{no:657,ad:"Onuralp"},{no:668,ad:"Ali Ömer"},{no:696,ad:"Roza"},{no:712,ad:"Mert"},{no:760,ad:"İpek"},{no:761,ad:"Eymen"},{no:784,ad:"Önder"},{no:788,ad:"Bora"},{no:789,ad:"Elif"},{no:839,ad:"Defne"},{no:849,ad:"Rüzgar"},{no:873,ad:"Derin"},{no:883,ad:"Melis"},{no:894,ad:"Emir Efe"},{no:901,ad:"Musa"}];

function show(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function saveC() {
  const val = document.getElementById('cName').value;
  localStorage.setItem('cls', val);
  document.getElementById('classTitle').innerText = val;
  alert("Sınıf adı güncellendi.");
}

function hardReset() {
  if(confirm("Tüm önbellek silinecek ve uygulama yeniden başlatılacak. Onaylıyor musunuz?")) {
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    localStorage.clear();
    location.reload(true);
  }
}

window.onload = () => {
  const cont = document.getElementById('listContainer');
  cont.innerHTML = STUDENTS.map(s => `<div style="padding:10px; border-bottom:1px solid #eee;">${s.no} - ${s.ad}</div>`).join('');
  
  const saved = localStorage.getItem('cls');
  if(saved) {
    document.getElementById('classTitle').innerText = saved;
    document.getElementById('cName').value = saved;
  }
};

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
