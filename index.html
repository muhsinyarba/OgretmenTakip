<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>4-B Takip Sistemi</title>
<style>
  body { font-family: sans-serif; margin: 0; background: #f0f4ff; display: flex; height: 100vh; overflow: hidden; }
  /* SOL MENÜ - DONMAZ YAPI */
  nav { width: 80px; background: #1e3a8a; display: flex; flex-direction: column; flex-shrink: 0; }
  nav button { padding: 20px 5px; border: none; background: none; color: white; font-size: 10px; border-bottom: 1px solid #2563eb; cursor: pointer; }
  nav button.active { background: #2563eb; border-left: 5px solid white; font-weight: bold; }
  /* İÇERİK */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  header { background: #2563eb; color: white; padding: 15px; text-align: center; font-weight: bold; }
  .content { flex: 1; overflow-y: auto; padding: 15px; }
  .page { display: none; }
  .page.active { display: block !important; }
  .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
  .btn-save { background: #16a34a; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
  th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
</style>
</head>
<body>

<nav>
  <button onclick="pg('p1', this)" class="active">YOKLAMA</button>
  <button onclick="pg('p2', this)">KATILIM</button>
  <button onclick="pg('p3', this)">ÖDEV</button>
  <button onclick="pg('p4', this)">RAPOR</button>
  <button onclick="pg('p5', this)">AYAR</button>
</nav>

<div class="main">
  <header>4-B SINIF TAKİBİ</header>
  <div class="content">
    <div id="p1" class="page active"><div class="card"><h3>Yoklama</h3><div id="list1"></div></div></div>
    <div id="p2" class="page"><div class="card"><h3>Katılım</h3><div id="list2"></div></div></div>
    <div id="p3" class="page"><div class="card"><h3>Ödev</h3><div id="list3"></div></div></div>
    <div id="p4" class="page">
        <div class="card">
            <h3>Genel Rapor</h3>
            <button onclick="window.print()" style="background:#ef4444; color:white; border:none; padding:10px; width:100%; border-radius:5px;">PDF İNDİR / YAZDIR</button>
            <div id="repArea"></div>
        </div>
    </div>
    <div id="p5" class="page"><div class="card"><h3>Ayarlar</h3><button onclick="localStorage.clear();location.reload();" style="color:red; background:none; border:none; width:100%;">SIFIRLA</button></div></div>
  </div>
  <div style="padding:10px; background:white; border-top:1px solid #ddd;">
    <button class="btn-save" onclick="sv()">💾 TÜMÜNÜ KAYDET</button>
  </div>
</div>

<script>
const ogrenciler = ["Ali Ömer ARSLAN","Arda ARSLAN","Ayşe ŞINIK","Barış HALLUM","Beyazıt GÖRKEN","Bilgesu TOPRAK","Bora ALAS","Defne KAYNAR","Derin URAZ","Elif ÇİTKAP","Emir Efe ALPER","Esra DEMİRLİ","Eymen HALICI","Hüma ALTINIŞIK","İpek ELDEK","Irmak ERDEM","Kumsal GÜNDOĞARKEN","Melis KILIÇ","Mert BALCIOĞLU","Musa KARAÖZ","Mustafa DAL","Naz AKGÜN","Nisa YALILAR","Onuralp TOK","Önder TURĞAY","Poyraz SEZGİN","Roza AYDIN","Rüzgar GÜL","Yaz YILMAZ","Yusuf BİRLİK"];

// Sayfa Geçişi
function pg(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    btn.classList.add('active');
    if(id === 'p4') rapor();
}

function rapor() {
    let h = "<table><tr><th>Öğrenci</th><th>Y</th><th>⭐</th><th>✅</th></tr>";
    ogrenciler.forEach(s => h += `<tr><td>${s}</td><td>0</td><td>0</td><td>0</td></tr>`);
    document.getElementById('repArea').innerHTML = h + "</table>";
}

function sv() { alert("Veriler Kaydedildi!"); }

// Sayfa yüklendiğinde listeyi bas
window.onload = function() {
    let html = ogrenciler.map(s => `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;"><span>${s}</span> <input type="checkbox"></div>`).join('');
    document.getElementById('list1').innerHTML = html;
    document.getElementById('list2').innerHTML = html;
    document.getElementById('list3').innerHTML = html;
};
</script>
</body>
</html>
