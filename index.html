<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Öğretmen Takip</title>
<style>
  body { font-family: sans-serif; margin: 0; background: #f0f4ff; }
  header { background: #2563eb; color: white; padding: 15px; text-align: center; }
  nav { display: flex; background: white; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 100; }
  nav button { flex: 1; padding: 15px 5px; border: none; background: none; font-weight: bold; cursor: pointer; color: #666; }
  nav button.active { color: #2563eb; border-bottom: 3px solid #2563eb; background: #f0f7ff; }
  .page { display: none; padding: 15px; }
  .page.active { display: block; }
  .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<header><h2>Sınıf Takip</h2></header>

<nav id="navbar">
  <button onclick="tab('p1', this)" class="active">Yoklama</button>
  <button onclick="tab('p2', this)">Katılım</button>
  <button onclick="tab('p3', this)">Ödev</button>
  <button onclick="tab('p4', this)">Ayarlar</button>
</nav>

<div id="p1" class="page active"><div class="card"><h3>Yoklama Sayfası</h3><p>Liste burada görünecek.</p></div></div>
<div id="p2" class="page"><div class="card"><h3>Katılım Sayfası</h3><p>Yıldızlar burada.</p></div></div>
<div id="p3" class="page"><div class="card"><h3>Ödev Sayfası</h3><p>Ödevler burada.</p></div></div>
<div id="p4" class="page">
    <div class="card">
        <h3>Ayarlar</h3>
        <button onclick="fClr()" style="background:red; color:white; padding:15px; border:none; width:100%; border-radius:8px; font-weight:bold;">ZORLA SIFIRLA VE HAFIZAYI SİL</button>
    </div>
</div>

<script>
function tab(id, btn) {
    // Sayfaları gizle
    var pgs = document.getElementsByClassName('page');
    for (var i = 0; i < pgs.length; i++) { pgs[i].style.display = 'none'; }
    // Butonları pasif yap
    var btns = document.querySelectorAll('nav button');
    for (var j = 0; j < btns.length; j++) { btns[j].className = ''; }
    
    // Seçileni göster
    document.getElementById(id).style.display = 'block';
    btn.className = 'active';
}

function fClr() {
    if(confirm("Tüm veriler temizlenecek!")) {
        localStorage.clear();
        location.reload(true);
    }
}
</script>
</body>
</html>
