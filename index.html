<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Öğretmen Takip">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Öğretmen Takip</title>
<style>
  :root {
    --primary: #2563eb; --primary-light: #dbeafe; --success: #16a34a; --success-light: #dcfce7;
    --danger: #dc2626; --danger-light: #fee2e2; --warn: #d97706; --warn-light: #fef3c7;
    --gray: #6b7280; --gray-light: #f3f4f6; --border: #e5e7eb; --white: #ffffff; --text: #111827;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4ff; color: var(--text); font-size: 14px; padding-bottom: env(safe-area-inset-bottom); }
  header { background: var(--primary); color: white; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  header h1 { font-size: 16px; font-weight: 700; }
  nav { display: flex; background: white; border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 53px; z-index: 99; }
  nav button { flex: 1; min-width: 80px; padding: 12px 6px; border: none; background: none; font-size: 12px; font-weight: 600; color: var(--gray); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  nav button.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--primary-light); }
  .page { display: none; padding: 12px; }
  .page.active { display: block; }
  .card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: var(--primary); }
  select, input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: white; margin-bottom: 10px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; }
  .btn-primary { background: var(--primary); color: white; }
  .student-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .att-btns { display: flex; gap: 4px; }
  .att-btn { padding: 6px 10px; border-radius: 6px; border: 1.5px solid var(--border); background: white; font-weight: 700; cursor: pointer; }
  .att-btn.var { background: var(--success); color: white; }
  .att-btn.yok { background: var(--danger); color: white; }
  .att-btn.gec { background: var(--warn); color: white; }
  .badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-success { background: var(--success-light); color: var(--success); }
  .badge-warn { background: var(--warn-light); color: var(--warn); }
  .hw-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .hw-tag { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; border: 1px solid var(--border); margin: 2px; cursor: pointer; }
  .hw-tag.teslim { background: var(--success-light); color: var(--success); border-color: var(--success); }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-box { background: white; border-radius: 10px; padding: 12px; text-align: center; }
  .report-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .progress-bar { height: 6px; border-radius: 3px; background: var(--gray-light); width: 80px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); }
</style>
</head>
<body>

<header>
  <div><h1>📚 Öğretmen Takip</h1><span id="todayLabel"></span></div>
  <div id="classLabel"></div>
</header>

<nav>
  <button class="active" onclick="showPage('yoklama',this)">📋 Yoklama</button>
  <button onclick="showPage('odev',this)">📝 Ödev</button>
  <button onclick="showPage('rapor',this)">📊 Rapor</button>
  <button onclick="showPage('ayarlar',this)">⚙️ Ayarlar</button>
</nav>

<div id="yoklama" class="page active">
  <div class="card">
    <h2>📋 Yoklama Al</h2>
    <select id="yoklamaDers"></select>
    <input type="date" id="yoklamaTarih">
    <div id="studentList"></div>
    <button class="btn btn-primary" onclick="saveAttendance()" id="saveAttBtn" style="display:none;margin-top:10px;">💾 Kaydet</button>
  </div>
</div>

<div id="odev" class="page">
  <div class="card">
    <h2>➕ Yeni Ödev</h2>
    <select id="odevDers"></select>
    <input type="text" id="odevBaslik" placeholder="Ödev başlığı">
    <input type="date" id="odevTarih">
    <button class="btn btn-primary" onclick="addHW()">Ödev Ekle</button>
  </div>
  <div class="card">
    <h2>📝 Ödevler</h2>
    <select id="odevFilter" onchange="renderHW()"></select>
    <div id="hwList"></div>
  </div>
</div>

<div id="rapor" class="page">
  <div class="stat-grid" id="statGrid"></div>
  <div class="card">
    <h2>📊 Öğrenci Raporu</h2>
    <select id="raporDers" onchange="renderReport()"></select>
    <div id="reportList"></div>
  </div>
</div>

<div id="ayarlar" class="page">
  <div class="card">
    <h2>⚙️ Sınıf Ayarları</h2>
    <input type="text" id="classNameInput" placeholder="örn: 4-A">
    <button class="btn btn-primary" onclick="saveClassName()">Kaydet</button>
  </div>
  <div class="card">
    <h2>👤 Öğrenci Listesi</h2>
    <div id="settingsStudentList"></div>
  </div>
</div>

<script>
const STUDENTS = [
  {no:309,ad:"Arda",soyad:"ARSLAN"},{no:318,ad:"Bilgesu",soyad:"TOPRAK"},
  {no:470,ad:"Irmak",soyad:"ERDEM"},{no:484,ad:"Yaz",soyad:"YILMAZ"},
  {no:485,ad:"Beyazıt",soyad:"GÖRKEN"},{no:512,ad:"Kumsal",soyad:"GÜNDOĞARKEN"},
  {no:526,ad:"Nisa",soyad:"YALILAR"},{no:554,ad:"Esra",soyad:"DEMİRLİ"},
  {no:556,ad:"Naz",soyad:"AKGÜN"},{no:614,ad:"Ayşe",soyad:"ŞINIK"},
  {no:616,ad:"Mustafa",soyad:"DAL"},{no:619,ad:"Barış",soyad:"HALLUM"},
  {no:631,ad:"Hüma",soyad:"ALTINIŞIK"},{no:639,ad:"Poyraz",soyad:"SEZGİN"},
  {no:650,ad:"Yusuf",soyad:"BİRLİK"},{no:657,ad:"Onuralp",soyad:"TOK"},
  {no:668,ad:"Ali Ömer",soyad:"ARSLAN"},{no:696,ad:"Roza",soyad:"AYDIN"},
  {no:712,ad:"Mert",soyad:"BALCIOĞLU"},{no:760,ad:"İpek",soyad:"ELDEK"},
  {no:761,ad:"Eymen",soyad:"HALICI"},{no:784,ad:"Önder",soyad:"TURĞAY"},
  {no:788,ad:"Bora",soyad:"ALAS"},{no:789,ad:"Elif",soyad:"ÇİTKAP"},
  {no:839,ad:"Defne",soyad:"KAYNAR"},{no:849,ad:"Rüzgar",soyad:"GÜL"},
  {no:873,ad:"Derin",soyad:"URAZ"},{no:883,ad:"Melis",soyad:"KILIÇ"},
  {no:894,ad:"Emir Efe",soyad:"ALPER"},{no:901,ad:"Musa",soyad:"KARAÖZ"}
];

const DERSLER = ["Türkçe","Matematik","Fen Bilimleri","Sosyal Bilgiler","İngilizce","Beden Eğitimi","Din Kültürü","Trafik Güvenliği","Müzik","İnsan Hakları","Görsel Sanatlar"];

let attendance = {}, homework = [], attState = {};

function load() {
  try {
    const a = localStorage.getItem('att'); if(a) attendance = JSON.parse(a);
    const h = localStorage.getItem('hw'); if(h) homework = JSON.parse(h);
    const c = localStorage.getItem('cls'); 
    if(c) { 
        document.getElementById('classNameInput').value=c; 
        document.getElementById('classLabel').textContent=c; 
    }
  } catch(e) { console.error("Yükleme hatası:", e); }
}

function save() {
  localStorage.setItem('att', JSON.stringify(attendance));
  localStorage.setItem('hw', JSON.stringify(homework));
}

function initSelects() {
  ['yoklamaDers','odevDers','odevFilter','raporDers'].forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    const isFilter = id==='odevFilter'||id==='raporDers';
    let html = isFilter ? '<option value="">Tüm Dersler</option>' : '<option value="">-- Ders Seçin --</option>';
    DERSLER.forEach(d => html += `<option value="${d}">${d}</option>`);
    el.innerHTML = html;
  });
}

function today() { return new Date().toISOString().split('T')[0]; }
function formatDate(d) { if(!d) return ''; const [y,m,day]=d.split('-'); return `${day}.${m}.${y}`; }

function showPage(p, btn) {
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
  document.getElementById(p).classList.add('active');
  btn.classList.add('active');
  if(p==='rapor') renderReport();
  if(p==='odev') renderHW();
}

function renderStudentList() {
  const ders = document.getElementById('yoklamaDers').value;
  const tarih = document.getElementById('yoklamaTarih').value;
  const list = document.getElementById('studentList');
  const btn = document.getElementById('saveAttBtn');
  if(!ders||!tarih){list.innerHTML='';btn.style.display='none';return;}
  const key = `${tarih}_${ders}`;
  attState = attendance[key] ? {...attendance[key]} : {};
  STUDENTS.forEach(s=>{ if(!attState[s.no]) attState[s.no]='var'; });
  btn.style.display='block';
  renderAttRows();
}

function renderAttRows() {
  document.getElementById('studentList').innerHTML = STUDENTS.map(s => {
    const st = attState[s.no]||'var';
    return `<div class="student-row">
      <div><b>${s.ad} ${s.soyad}</b><br><small>#${s.no}</small></div>
      <div class="att-btns">
        <button class="att-btn ${st==='var'?'var':''}" onclick="setAtt(${s.no},'var')">✓</button>
        <button class="att-btn ${st==='gec'?'gec':''}" onclick="setAtt(${s.no},'gec')">G</button>
        <button class="att-btn ${st==='yok'?'yok':''}" onclick="setAtt(${s.no},'yok')">✗</button>
      </div>
    </div>`;
  }).join('');
}

function setAtt(no, val) { attState[no]=val; renderAttRows(); }

function saveAttendance() {
  const ders = document.getElementById('yoklamaDers').value;
  const tarih = document.getElementById('yoklamaTarih').value;
  if(!ders||!tarih) return;
  attendance[`${tarih}_${ders}`] = {...attState};
  save();
  alert("Kaydedildi!");
}

function addHW() {
    const ders = document.getElementById('odevDers').value;
    const baslik = document.getElementById('odevBaslik').value;
    const tarih = document.getElementById('odevTarih').value;
    if(!ders || !baslik || !tarih) return alert("Eksik alan!");
    const teslim = {}; STUDENTS.forEach(s => teslim[s.no] = false);
    homework.push({id: Date.now(), ders, baslik, tarih, teslim});
    save(); renderHW();
}

function renderHW() {
    const filter = document.getElementById('odevFilter').value;
    const list = document.getElementById('hwList');
    const hw = homework.filter(h => !filter || h.ders === filter);
    list.innerHTML = hw.map(h => {
        const done = Object.values(h.teslim).filter(Boolean).length;
        return `<div class="hw-item">
            <b>${h.baslik}</b> (${h.ders})<br>
            <span class="badge ${done===STUDENTS.length?'badge-success':'badge-warn'}">${done}/${STUDENTS.length} teslim</span>
            <div style="margin-top:5px;">${STUDENTS.map(s => `<span class="hw-tag ${h.teslim[s.no]?'teslim':''}" onclick="toggleHW(${h.id},${s.no})">${s.ad}</span>`).join('')}</div>
        </div>`;
    }).join('');
}

function toggleHW(id, no) {
    const h = homework.find(x => x.id === id);
    if(h) { h.teslim[no] = !h.teslim[no]; save(); renderHW(); }
}

function renderReport() {
    const filter = document.getElementById('raporDers').value;
    document.getElementById('statGrid').innerHTML = `
        <div class="stat-box"><h3>${STUDENTS.length}</h3><small>Öğrenci</small></div>
        <div class="stat-box"><h3>${homework.length}</h3><small>Ödev</small></div>`;
    
    document.getElementById('reportList').innerHTML = STUDENTS.map(s => {
        let done = 0, total = 0;
        homework.forEach(h => { if(!filter || h.ders === filter) { total++; if(h.teslim[s.no]) done++; } });
        const pct = total > 0 ? Math.round((done/total)*100) : 0;
        return `<div class="report-row">
            <div style="flex:1">${s.ad} ${s.soyad}</div>
            <div style="text-align:right">Ödev: ${done}/${total} (%${pct})<div class="progress-bar"><div class="progress-fill
