<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Öğretmen Takip - Katılım & Ödev</title>
<style>
  :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --warn: #d97706; --gray: #6b7280; --border: #e5e7eb; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f0f4ff; color: #111827; padding-bottom: 90px; }
  header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
  nav { display: flex; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 55px; z-index: 99; }
  nav button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: var(--gray); border-bottom: 3px solid transparent; font-size: 13px; }
  nav button.active { color: var(--primary); border-bottom-color: var(--primary); background: #f0f7ff; }
  .page { display: none; padding: 15px; }
  .page.active { display: block; }
  .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  
  .student-row { display: flex; flex-direction: column; padding: 12px 0; border-bottom: 1px solid #eee; }
  .student-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .controls { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  
  .group-label { font-size: 11px; color: var(--gray); font-weight: bold; margin-bottom: 4px; display: block; }
  .btn-group { display: flex; gap: 4px; }
  
  .btn-item { padding: 8px 10px; border-radius: 6px; border: 1.5px solid #ddd; background: white; font-weight: bold; cursor: pointer; font-size: 11px; }
  .btn-item.kat-v.active { background: var(--success); color: white; border-color: var(--success); }
  .btn-item.kat-y.active { background: var(--danger); color: white; border-color: var(--danger); }
  .btn-item.odev-v.active { background: #8b5cf6; color: white; border-color: #8b5cf6; }
  
  .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; }
  .total-badge { background: var(--danger-light); color: var(--danger); padding: 2px 6px; border-radius: 4px; font-weight: bold; }
  
  .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #ddd; z-index: 1000; }
  .btn-main { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h2 id="titleText">Öğretmen Takip</h2>
  <div id="dateDisplay" style="font-size:12px; margin-top:4px;"></div>
</header>

<nav>
  <button class="active" onclick="switchTab('yoklama', this)">📋 Takip</button>
  <button onclick="switchTab('rapor', this)">📊 Toplamlar</button>
  <button onclick="switchTab('ayarlar', this)">⚙️ Ayarlar</button>
</nav>

<div id="yoklama" class="page active">
  <div class="card">
    <div id="studentContainer
