<div id="rapor" class="page">
  <div class="card">
    <h3>📊 Detaylı Analiz</h3>
    <select id="raporTur" onchange="renderRapor()">
      <option value="genel">Genel Sınıf Özeti</option>
      <option value="ogrenci">Öğrenci Bazlı Detay</option>
      <option value="ders">Ders Bazlı Detay</option>
    </select>
    <div id="raporFiltrele"></div>
    <div id="listRapor" style="margin-top:15px; overflow-x:auto;"></div>
    
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="btn-main" style="background:#059669;" onclick="exportExcel()">📥 Excel İndir</button>
      <button class="btn-main" style="background:#dc2626;" onclick="window.print()">🖨️ PDF / Yazdır</button>
    </div>
  </div>
</div>

<script>
// Harici kütüphaneleri dinamik olarak ekliyoruz (Excel için)
const script = document.createElement('script');
script.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
document.head.appendChild(script);

// Alfabetik Soyadlı Liste
const STUDENTS = [
  {no:668,ad:"Ali Ömer",soyad:"ARSLAN"},{no:309,ad:"Arda",soyad:"ARSLAN"},{no:614,ad:"Ayşe",soyad:"ŞINIK"},
  {no:619,ad:"Barış",soyad:"HALLUM"},{no:485,ad:"Beyazıt",soyad:"GÖRKEN"},{no:318,ad:"Bilgesu",soyad:"TOPRAK"},
  {no:788,ad:"Bora",soyad:"ALAS"},{no:839,ad:"Defne",soyad:"KAYNAR"},{no:873,ad:"Derin",soyad:"URAZ"},
  {no:789,ad:"Elif",soyad:"ÇİTKAP"},{no:894,ad:"Emir Efe",soyad:"ALPER"},{no:554,ad:"Esra",soyad:"DEMİRLİ"},
  {no:761,ad:"Eymen",soyad:"HALICI"},{no:631,ad:"Hüma",soyad:"ALTINIŞIK"},{no:760,ad:"İpek",soyad:"ELDEK"},
  {no:470,ad:"Irmak",soyad:"ERDEM"},{no:512,ad:"Kumsal",soyad:"GÜNDOĞARKEN"},{no:883,ad:"Melis",soyad:"KILIÇ"},
  {no:712,ad:"Mert",soyad:"BALCIOĞLU"},{no:901,ad:"Musa",soyad:"KARAÖZ"},{no:616,ad:"Mustafa",soyad:"DAL"},
  {no:556,ad:"Naz",soyad:"AKGÜN"},{no:526,ad:"Nisa",soyad:"YALILAR"},{no:657,ad:"Onuralp",soyad:"TOK"},
  {no:784,ad:"Önder",soyad:"TURĞAY"},{no:639,ad:"Poyraz",soyad:"SEZGİN"},{no:696,ad:"Roza",soyad:"AYDIN"},
  {no:849,ad:"Rüzgar",soyad:"GÜL"},{no:484,ad:"Yaz",soyad:"YILMAZ"},{no:650,ad:"Yusuf",soyad:"BİRLİK"}
].sort((a,b) => a.ad.localeCompare(b.ad, 'tr'));

const DERSLER = ["Türkçe","Matematik","Fen Bilimleri","Sosyal Bilgiler","İngilizce"];
let db = JSON.parse(localStorage.getItem('edu_master_final') || '{"dev":{}, "kat":{}, "odev":{}}');

window.renderRapor = function() {
    const tur = document.getElementById('raporTur').value;
    const cont = document.getElementById('listRapor');
    let html = "";

    if (tur === 'genel') {
        html = `<table border="1" style="width:100%; border-collapse:collapse; font-size:12px;">
            <tr style="background:#eee;"><th>Öğrenci</th><th>Devamsızlık</th><th>Yıldız</th><th>Ödev</th></tr>`;
        STUDENTS.forEach(s => {
            let yok = 0, yildiz = 0, odev = 0;
            Object.values(db.dev).forEach(d => { if(d[s.no]==='yok') yok++; });
            Object.values(db.kat).forEach(l => { if(l[s.no]) yildiz++; });
            Object.values(db.odev).forEach(l => { if(l[s.no]) odev++; });
            html += `<tr><td>${s.ad} ${s.soyad}</td><td align="center">${yok}</td><td align="center">${yildiz}</td><td align="center">${odev}</td></tr>`;
        });
        html += "</table>";
    } else if (tur === 'ogrenci') {
        html = "<p style='font-size:11px; color:gray;'>Her öğrencinin tüm derslerdeki başarı yüzdesi listelenir.</p>";
        STUDENTS.forEach(s => {
            let dersKatilim = 0, toplamDers = Object.keys(db.kat).length;
            Object.values(db.kat).forEach(l => { if(l[s.no]) dersKatilim++; });
            let yuzde = toplamDers > 0 ? Math.round((dersKatilim / toplamDers) * 100) : 0;
            html += `<div class="student-row"><b>${s.ad} ${s.soyad}</b> <span>Akademik Katılım: %${yuzde}</span></div>`;
        });
    } else if (tur === 'ders') {
        html = "<table border='1' style='width:100%; border-collapse:collapse; font-size:12px;'><tr style='background:#eee;'><th>Ders</th><th>Ort. Katılım</th><th>Ödev Tamamlama</th></tr>";
        DERSLER.forEach(d => {
            let dKat = 0, dOdev = 0, dSayisi = 0;
            Object.entries(db.kat).forEach(([key, val]) => { if(key.includes(d)) { dSayisi++; Object.values(val).forEach(v => { if(v) dKat++; }); } });
            Object.entries(db.odev).forEach(([key, val]) => { if(key.includes(d)) { Object.values(val).forEach(v => { if(v) dOdev++; }); } });
            let katOrt = dSayisi > 0 ? Math.round(dKat / (dSayisi * 30) * 100) : 0;
            html += `<tr><td>${d}</td><td align="center">%${katOrt}</td><td align="center">${dOdev} Toplam</td></tr>`;
        });
        html += "</table>";
    }
    cont.innerHTML = html;
};

// Excel Dışa Aktarma Fonksiyonu
window.exportExcel = function() {
    const tur = document.getElementById('raporTur').value;
    let data = [];
    if(tur === 'genel') {
        data = STUDENTS.map(s => {
            let yok = 0, yildiz = 0, odev = 0;
            Object.values(db.dev).forEach(d => { if(d[s.no]==='yok') yok++; });
            Object.values(db.kat).forEach(l => { if(l[s.no]) yildiz++; });
            Object.values(db.odev).forEach(l => { if(l[s.no]) odev++; });
            return {"Öğrenci": `${s.ad} ${s.soyad}`, "Devamsızlık": yok, "Yıldız": yildiz, "Ödev": odev};
        });
    }
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Rapor");
    XLSX.writeFile(wb, `Ogretmen_Takip_Rapor_${new Date().toLocaleDateString()}.xlsx`);
};
</script>
