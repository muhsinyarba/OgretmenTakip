<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Öğretmen Takip - GÜNCEL</title>
<link rel="manifest" href="manifest.json">
<style>
  :root { --primary: #2563eb; --gray: #6b7280; --border: #e5e7eb; --text: #111827; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f0f4ff; color: var(--text); padding-bottom: 20px; }
  header { background: var(--primary); color: white; padding: 15px; text-align: center; }
  nav { display: flex; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
  nav button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: var(--gray); border-bottom: 3px solid transparent; }
  nav button.active { color: var(--primary); border-bottom-color: var(--primary); background: #f0f7ff; }
  .page { display: none; padding: 15px; }
  .page.active { display: block; }
  .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<header>
  <h2 id="headerTitle">📚 Öğretmen Takip</h2>
  <small id="dateInfo"></small>
</header>

<nav id="navbar">
  <button id="btn-yoklama" class="active" onclick="showP('yoklama', this)">📋 Yoklama</button>
  <button id="btn-odev" onclick="showP('odev', this)">📝 Ödev</button>
  <button id="btn-ayarlar" onclick="showP('ayarlar', this)">⚙️ Ayarlar</button>
</nav>

<div id="yoklama" class="page active">
  <div class="card">
    <h3>📋 Yoklama Listesi</h3>
    <div id="listDisplay">Yükleniyor...</div>
  </div>
</div>

<div id="odev" class="page"><div class="card"><h3>📝 Ödevler</h3><p>Burada ödev takibi yapılacak.</p></div></div>

<div id="ayarlar" class="page">
  <div class="card">
    <h3>⚙️ Sistem Ayarları</h3>
    <p>Uygulama düzgün çalışmıyorsa aşağıdaki butona basın:</p>
    <button onclick="forceReset()" style="margin-top:10px; padding:10px; background:red; color:white; border:none; border-radius:8px; width:100%; font-weight:bold;">⚠️ UYGULAMAYI ZORLA SIFIRLA</button>
  </div>
</div>

<script>
// 30 kişilik listeniz
const STUDENTS = [{no:309,ad:"Arda"},{no:318,ad:"Bilgesu"},{no:470,ad:"Irmak"},{no:484,ad:"Yaz"},{no:485,ad:"Beyazıt"},{no:512,ad:"Kumsal"},{no:526,ad:"Nisa"},{no:554,ad:"Esra"},{no:556,ad:"Naz"},{no:614,ad:"Ayşe"},{no:616,ad:"Mustafa"},{no:619,ad:"Barış"},{no:631,ad:"Hüma"},{no:639,ad:"Poyraz"},{no:650,ad:"Yusuf"},{no:657,ad:"Onuralp"},{no:668,ad:"Ali Ömer"},{no:696,ad:"Roza"},{no:712,ad:"Mert"},{no:760,ad:"İpek"},{no:761,ad:"Eymen"},{no:784,ad:"Önder"},{no:788,ad:"Bora"},{no:789,ad:"Elif"},{no:839,ad:"Defne"},{no:849,ad:"Rüzgar"},{no:873,ad:"Derin"},{no:883,ad:"Melis"},{no:894,ad:"Emir Efe"},{no:901,ad:"Musa"}];

// Menü geçiş fonksiyonu (En başa alındı)
function showP(pageId, btn) {
  try {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    btn.classList.add('active');
  } catch(e) { console.error("Sayfa geçiş hatası:", e); }
}

function forceReset() {
  if(confirm("Tüm hafıza temizlenecek. Onaylıyor musunuz?")) {
    localStorage.clear();
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    location.reload(true);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  try {
    const list = document.getElementById('listDisplay');
    list.innerHTML = STUDENTS.map(s => `<div style="padding:10px; border-bottom:1px solid #eee;">${s.no} - ${s.ad}</div>`).join('');
    document.getElementById('dateInfo').innerText = new Date().toLocaleDateString('tr-TR');
  } catch(err) {
    document.body.innerHTML = "Hata oluştu: " + err.message;
  }
});

// Service worker kaydını geçici olarak durdurup temizleme moduna geçiyoruz
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    for(let reg of regs) { reg.unregister(); }
  });
}
</script>
</body>
</html>
